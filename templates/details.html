<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <div class="section-title-row">
      <div class="num">01</div>
      <div class="title">Fill in Your Details</div>
      <div class="line"></div>
    </div>

    <div class="form-wrap">
      <section class="form-card">
        <h3>Fill this form up</h3>
        <form class="form-grid" id="detailsForm" action="{{ assistant_href }}" method="get">
          <input id="detailsBizId" name="biz_id" type="hidden" value="{{ default_biz_id }}" />
          <div class="field">
            <label>First name *</label>
            <input name="first_name" placeholder="Enter your first name" required />
          </div>
          <div class="field">
            <label>Last name*</label>
            <input name="last_name" placeholder="Enter your last name" required />
          </div>
          <div class="field">
            <label>Phone</label>
            <input name="phone" placeholder="Enter your phone number" required />
          </div>
          <div class="field field-span-2">
            <label>Next</label>
            <input value="City and schedule will be confirmed with Yobo in the next step." disabled />
          </div>
          <button class="btn-outline" type="submit">Continue with Yobo</button>
        </form>
      </section>
    </div>
  </main>
  <script>
    const detailsParams = new URLSearchParams(window.location.search);
    const detailsForm = document.getElementById('detailsForm');
    const detailsBizIdInput = document.getElementById('detailsBizId');
    const detectedBizId =
      detailsParams.get('biz_id') ||
      localStorage.getItem('biz_id') ||
      detailsBizIdInput.value ||
      '';

    if (detectedBizId) {
      detailsBizIdInput.value = detectedBizId;
      localStorage.setItem('biz_id', detectedBizId);
    }

    if (detailsForm) {
      detailsForm.addEventListener('submit', () => {
        const formData = new FormData(detailsForm);
        if (detectedBizId) localStorage.setItem('biz_id', detectedBizId);
        localStorage.setItem('first_name', formData.get('first_name') || '');
        localStorage.setItem('last_name', formData.get('last_name') || '');
        localStorage.setItem('phone', formData.get('phone') || '');
      });
    }
  </script>
{% include 'partials/yobo_chat.html' %}
</body>
</html>
