<section class="assistant-card assistant-card-live">
  <h2 class="assistant-title">Hello! I'm Yobo</h2>
  <p class="assistant-sub">Helping with car rentals</p>
  <div class="assistant-bubble">
    Tell me your dates, budget, or the type of car you want. I can also show the available fleet.
  </div>
  <div class="assistant-transcript" id="pageAssistantMessages"></div>
  <form class="assistant-inline-form" id="pageAssistantForm">
    <input class="assistant-input" id="pageAssistantInput" placeholder="Ask Yobo about cars, dates, or availability..." />
    <button class="btn-black" id="pageAssistantSend" type="submit">Ask Yobo</button>
  </form>
</section>
