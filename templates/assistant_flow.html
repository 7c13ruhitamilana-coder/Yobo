<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ company_name }} Enquiry Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body
  class="assistant-flow-page"
  data-default-biz-id="{{ default_biz_id }}"
  data-business-slug="{{ current_business_slug }}"
  data-company-name="{{ company_name }}"
  data-assistant-name="{{ assistant_name }}"
  data-brand-wordmark="{{ brand_wordmark }}"
  data-currency="{{ currency }}"
  data-processing-fee="{{ processing_fee }}"
  data-gst-rate="{{ vat_rate }}"
>
  <main class="assistant-flow-shell assistant-flow-shell-chat">
    <nav class="nav">
      <div class="logo veep-logo" aria-label="{{ company_name }}">
        <span class="veep-logo-mark veep-logo-mark-left"></span>
        <span class="veep-logo-word">{{ brand_wordmark }}</span>
        <span class="veep-logo-mark veep-logo-mark-right"></span>
      </div>
      <div class="menu">
        <a href="{{ home_href }}">Home</a>
        <a href="{{ fleet_href }}">Our Fleet</a>
        <a class="active" href="{{ assistant_href }}">Start Enquiry</a>
      </div>
      <div></div>
    </nav>

    <section class="assistant-chat-window">
      <div id="assistantFlowConsentRoot"></div>
      <div class="assistant-chat-thread assistant-flow-thread" id="assistantFlowThread"></div>
      <form class="assistant-chat-composer assistant-flow-composer" id="assistantFlowComposer">
        <input
          class="assistant-chat-input assistant-flow-input"
          id="assistantFlowInput"
          type="text"
          placeholder="Type your reply here..."
          autocomplete="off"
        />
        <button class="btn-black assistant-chat-send" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script id="assistantFlowConfig" type="application/json">{{ assistant_flow_config|tojson }}</script>
  <script src="{{ url_for('static', filename='assistant_flow.js') }}"></script>
</body>
</html>
