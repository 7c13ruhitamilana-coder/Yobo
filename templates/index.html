<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ company_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body style="--accent: {{ theme_accent }}; --accent-deep: {{ theme_accent_deep }}; --accent-rgb: {{ theme_accent_rgb }}; --border: {{ theme_border }}; --bg: {{ theme_bg }}; --surface-soft: {{ theme_soft }};">
  <main class="container">
    <nav class="nav">
      <div class="logo veep-logo" aria-label="{{ company_name }}">
        <span class="veep-logo-mark veep-logo-mark-left"></span>
        <span class="veep-logo-word">{{ brand_wordmark }}</span>
        <span class="veep-logo-mark veep-logo-mark-right"></span>
      </div>
      <div class="menu">
        <a class="active" href="{{ home_href }}">Home</a>
        <a href="{{ fleet_href }}">Our Fleet</a>
        <a href="{{ assistant_href }}">Start Enquiry</a>
      </div>
      <div></div>
    </nav>

    <section class="hero">
      <h1>{{ hero_title }}</h1>
      <p>
        {{ hero_subtitle }}
      </p>
      <a class="btn-pill" href="{{ assistant_href }}">
        Start your enquiry
        <span class="arrow">&#8594;</span>
      </a>
    </section>
  </main>
{% include 'partials/yobo_chat.html' %}
  <script id="locationRoutingConfig" type="application/json">{{ location_routing_config|tojson }}</script>
  <script src="{{ url_for('static', filename='location_routing.js') }}"></script>
</body>
</html>
