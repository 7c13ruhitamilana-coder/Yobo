<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ company_name }} Fleet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body data-default-biz-id="{{ default_biz_id }}" data-business-slug="{{ current_business_slug }}">
  <main class="container">
    <nav class="nav">
      <div class="logo veep-logo" aria-label="{{ company_name }}">
        <span class="veep-logo-mark veep-logo-mark-left"></span>
        <span class="veep-logo-word">{{ brand_wordmark }}</span>
        <span class="veep-logo-mark veep-logo-mark-right"></span>
      </div>
      <div class="menu">
        <a href="{{ home_href }}">Home</a>
        <a class="active" href="{{ fleet_href }}">Our Fleet</a>
        <a href="{{ assistant_href }}">Start Enquiry</a>
      </div>
      <div></div>
    </nav>

    <div class="section-title-row">
      <div class="num">02</div>
      <div class="title">Pick Your Dream Car</div>
      <div class="line"></div>
    </div>

    <div class="assistant-flow-fleet-status">
      Browse the fleet here. To submit an enquiry, continue with Yobo.
    </div>

    <section class="fleet-grid" id="fleetGrid"></section>

    <div class="summary-actions">
      <a class="btn-confirm" href="{{ assistant_href }}">Start Enquiry</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const defaultBizId = document.body.dataset.defaultBizId || {{ default_biz_id|tojson }};
    const businessSlug = document.body.dataset.businessSlug || '';
    const bizStorageKey = businessSlug ? `biz_id:${businessSlug}` : 'biz_id';
    const startStorageKey = businessSlug ? `start_date:${businessSlug}` : 'start_date';
    const endStorageKey = businessSlug ? `end_date:${businessSlug}` : 'end_date';
    const cityStorageKey = businessSlug ? `city:${businessSlug}` : 'city';
    const bizId = params.get('biz_id') || defaultBizId || localStorage.getItem(bizStorageKey) || '';
    const startFromQuery = params.get('start_date') || localStorage.getItem(startStorageKey) || '';
    const endFromQuery = params.get('end_date') || localStorage.getItem(endStorageKey) || '';
    if (bizId) localStorage.setItem(bizStorageKey, bizId);
    if (startFromQuery) localStorage.setItem(startStorageKey, startFromQuery);
    if (endFromQuery) localStorage.setItem(endStorageKey, endFromQuery);
    const firstFromQuery = params.get('first_name') || '';
    const lastFromQuery = params.get('last_name') || '';
    const phoneFromQuery = params.get('phone') || '';
    const cityFromQuery = params.get('city') || '';
    if (firstFromQuery) localStorage.setItem('first_name', firstFromQuery);
    if (lastFromQuery) localStorage.setItem('last_name', lastFromQuery);
    if (phoneFromQuery) localStorage.setItem('phone', phoneFromQuery);
    if (cityFromQuery) localStorage.setItem(cityStorageKey, cityFromQuery);

    function cardHTML(car) {
      const img = (car.photo_url || '').trim() || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop';
      const priceValue = Number(car.price_per_day || 0);
      const priceLabel = priceValue ? priceValue.toLocaleString() : '-';
      return `
        <article class="fleet-card">
          <div class="fleet-image">
            <img src="${img}" alt="${car.make || 'Car'}" />
          </div>
          <div class="fleet-meta">
            <div>Make: ${car.make || '-'}</div>
            <div>Model: ${car.model || '-'}</div>
            <div>Price/Day: SGD ${priceLabel}</div>
          </div>
        </article>
      `;
    }

    async function loadFleet() {
      const startDate = localStorage.getItem(startStorageKey) || '';
      const endDate = localStorage.getItem(endStorageKey) || '';
      const query = new URLSearchParams();
      if (bizId) query.set('biz_id', bizId);
      if (startDate && endDate) {
        query.set('start_date', startDate);
        query.set('end_date', endDate);
      }
      const res = await fetch(`/api/fleet?${query.toString()}`);
      const data = await res.json();
      const fleet = data.data || [];
      const grid = document.getElementById('fleetGrid');
      if (!data.ok) {
        grid.innerHTML = `<div>${data.error || 'Unable to load the fleet right now.'}</div>`;
        return;
      }
      if (!fleet.length) {
        grid.innerHTML = '<div>No available cars found.</div>';
        return;
      }
      grid.innerHTML = fleet.map(cardHTML).join('');
    }

    loadFleet();
  </script>
{% include 'partials/yobo_chat.html' %}
</body>
</html>
