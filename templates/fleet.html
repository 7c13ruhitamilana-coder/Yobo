<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Fleet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  {% set biz_query = '?biz_id=' ~ default_biz_id if default_biz_id else '' %}
  <main class="container">
    <div class="section-title-row">
      <div class="num">02</div>
      <div class="title">Pick Your Dream Car</div>
      <div class="line"></div>
    </div>

    <section class="fleet-grid" id="fleetGrid"></section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const defaultBizId = {{ default_biz_id|tojson }};
    const bizId = params.get('biz_id') || localStorage.getItem('biz_id') || defaultBizId || '';
    const startFromQuery = params.get('start_date') || '';
    const endFromQuery = params.get('end_date') || '';
    if (bizId) localStorage.setItem('biz_id', bizId);
    if (startFromQuery) localStorage.setItem('start_date', startFromQuery);
    if (endFromQuery) localStorage.setItem('end_date', endFromQuery);
    const firstFromQuery = params.get('first_name') || '';
    const lastFromQuery = params.get('last_name') || '';
    const phoneFromQuery = params.get('phone') || '';
    const cityFromQuery = params.get('city') || '';
    if (firstFromQuery) localStorage.setItem('first_name', firstFromQuery);
    if (lastFromQuery) localStorage.setItem('last_name', lastFromQuery);
    if (phoneFromQuery) localStorage.setItem('phone', phoneFromQuery);
    if (cityFromQuery) localStorage.setItem('city', cityFromQuery);

    function cardHTML(car) {
      const img = (car.photo_url || '').trim() || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop';
      const priceValue = Number(car.price_per_day || 0);
      const priceLabel = priceValue ? priceValue.toLocaleString() : '-';
      return `
        <article class="fleet-card">
          <div class="fleet-image">
            <img src="${img}" alt="${car.make || 'Car'}" />
          </div>
          <div class="fleet-meta">
            <div>Make: ${car.make || '-'}</div>
            <div>Model: ${car.model || '-'}</div>
            <div>Price/Day: AED ${priceLabel}</div>
          </div>
        </article>
      `;
    }

    async function loadFleet() {
      const startDate = localStorage.getItem('start_date') || '';
      const endDate = localStorage.getItem('end_date') || '';
      const query = new URLSearchParams();
      if (bizId) query.set('biz_id', bizId);
      if (startDate && endDate) {
        query.set('start_date', startDate);
        query.set('end_date', endDate);
      }
      const res = await fetch(`/api/fleet?${query.toString()}`);
      const data = await res.json();
      const fleet = data.data || [];
      const grid = document.getElementById('fleetGrid');
      if (!fleet.length) {
        grid.innerHTML = '<div>No available cars found.</div>';
        return;
      }
      grid.innerHTML = fleet.map(cardHTML).join('');
    }

    loadFleet();
  </script>
{% include 'partials/yobo_chat.html' %}
</body>
</html>
